name: Minimal CI

on:
  push:
  pull_request:
    branches:
      - main
      - dev

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall backend

      - name: Validate parsed LEET data
        run: python -m backend.app.services.import_leet_data --dry-run
